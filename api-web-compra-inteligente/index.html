<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8"/>
    <title>Compra Inteligente API</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg mavbar-dark d-none" id="mainNavbar">
        <div class="container">
            <a class="navbar-brand" href="#">
                SmartBuy - Compras Inteligentes
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="">ALGUMA COISA 1</a></li>
                    <li class="nav-item"><a class="nav-link" href="">ALGUMA COISA 2</a></li>
                    <li class="nav-item"><a class="nav-link" href="">ALGUMA COISA 3</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <!-- LOGIN -->
        <div id="loginView" class="card p-4 col-md-4 mx-auto">
            <img src="img/shopping-cart.png" alt="SmartBuy" />
            <h4>Login</h4>
            <input id="loginCpf" class="form-control mb-2" placeholder="CPF">
            <input id="loginSenha" class="form-control mb-2" placeholder="Senha">

            <div class="d-grid gap-2">
                <button class="btn btn-primary" onclick="login()">Entrar</button>
                <button class="btn btn-outline-secondary" onclick="toggleRegister()">Criar novo usuário</button>
            </div>

            <!-- REGISTER -->
            <div id="registerBox" class="mt-3 d-none">
                <hr>
                <h6>Novo Usuário</h6>
                <input id="registerUser" class="form-control mb-2" placeholder="Nome">
                <input id="registerCpf" class="form-control mb-2" placeholder="CPF">
                <input id="registerEmail" class="form-control mb-2" placeholder="E-mail">
                <input id="registerSenha" class="form-control mb-2" placeholder="Senha">
                <button class="btn btn-success w-100" onclick="register()">Cadastrar</button>
            </div>
        </div>

        <!-- APP -->
        <div id="appView" class="d-none">

            <div class="card p-4 col-md-6 mx-auto">
                <h4>Predição de Conversão</h4>
                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label>Idade</label>
                            <input id="age" type="number" class="form-control">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Renda Mensal</label>
                            <input id="income" type="number" class="form-control">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Gênero</label>
                            <select id="gender" class="form-control">
                                <option value="male">Masculino</option>
                                <option value="female">Feminino</option>
                                <option value="other">Outro</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Dispositivo</label>
                            <select id="device_type" class="form-control">
                                <option value="mobile">Mobile</option>
                                <option value="desktop">Desktop</option>
                                <option value="tablet">Tablet</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Duração da Sessão (seg)</label>
                            <input id="session_duration" type="number" class="form-control">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Páginas Visitadas</label>
                            <input id="pages_visited" type="number" class="form-control">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Compras Anteriores</label>
                            <input id="previous_purchases" type="number" class="form-control">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Cliques em Anúncios</label>
                            <input id="ad_clicks" type="number" class="form-control">
                        </div>
                    </div>
                <button class="btn btn-primary mt-3" onclick="predizer()">
                    Predizer Conversão
                </button>
                <div id="resultado" class="alert alert-info mt-3 d-none"></div>
            </div>
            <div class="card mt-4 d-none" id="resultadoCard">
                <div class="card-body">
                    <h5 id="resultadoTitulo"></h5>
                    <p id="resultadoProb"></p>
                </div>
            </div>
        </div>
    </div>
    <script src="scripts.js"></script>
</body>

</html>
